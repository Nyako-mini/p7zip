name: p7zip-release

on:
  push:
    branches:
      - '**'

  pull_request:

  workflow_dispatch:

  release:
    tags:
      - '*'

jobs:
  build:
    name: Linux-ARM64-7za
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            gcc \
            g++ \
            make

      - name: Build 7za
        run: |
          mkdir -p release/bin

          export PROJECT_ROOT=$(pwd)

          cd CPP/7zip/Bundles/Alone

          make -f makefile.gcc -j$(nproc)

          cp -f b/g/7za $PROJECT_ROOT/release/bin/

      - name: Strip binary
        run: |
          strip release/bin/7za || true

      - name: Check binary
        run: |
          file release/bin/7za
          chmod +x release/bin/7za
          ./release/bin/7za

      - name: Package
        run: |
          cd release
          tar -czf ../7za-linux-arm64.tar.gz .
          zip -r ../7za-linux-arm64.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 7za-linux-arm64
          path: |
            7za-linux-arm64.tar.gz
            7za-linux-arm64.zip

      - name: Upload release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: 7za-linux-arm64.*
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
          body: "Linux ARM64 7za release"
